<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Espace réservé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        
        .icon i {
            font-size: 40px;
            color: #999;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 1rem;
        }
        
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 2rem;
        }
        
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .divider {
            width: 40px;
            height: 2px;
            background: #ddd;
            margin: 2rem auto;
        }
        
        .footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <i class="fas fa-lock"></i>
        </div>
        
        <h1>Espace réservé</h1>
        
        <div class="badge">
            <i class="fas fa-code"></i> Site en construction
        </div>
        
        <p>
            Cette page est actuellement en cours de développement.<br>
            Nous revenons très bientôt.
        </p>
        
        <div class="divider"></div>
        
        <div class="footer">
            &copy; 2025 — Tous droits réservés
        </div>
    </div>
</body>
</html>
